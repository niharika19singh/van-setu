# Render deployment configuration
# https://render.com/docs/yaml-spec
#
# Deploy Steps:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect your GitHub repo → Render auto-reads this file
#   4. Set the env vars marked sync:false in the Render dashboard

services:
  - type: web
    name: van-setu-backend
    env: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Optional: live AQI data (fallback static data used if missing)
      # Get your key at https://aqicn.org/api/
      - key: OPENAQ_API_KEY
        sync: false
      # Optional: MongoDB Atlas URI for community corridor suggestions
      # Format: mongodb+srv://user:pass@cluster.mongodb.net/vansetu
      - key: MONGODB_URI
        sync: false
      # Optional: Telegram Bot token for the community bot
      - key: TELEGRAM_BOT_TOKEN
        sync: false
